keys:
  # Your admin age key (run once: age-keygen -o ~/.config/sops/age/keys.txt)
  # Then get the pubkey: age-keygen -y ~/.config/sops/age/keys.txt
  - &admin age1REPLACE_WITH_YOUR_ADMIN_AGE_PUBKEY

  # Machine keys derived from SSH host keys (run on each machine after first boot):
  #   cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age
  # Or remotely (once SSH is reachable):
  #   ssh-keyscan -t ed25519 thinkpad-x220 | ssh-to-age
  #   ssh-keyscan -t ed25519 tongfang-amd | ssh-to-age
  - &thinkpad age1REPLACE_WITH_THINKPAD_AGE_PUBKEY
  - &tongfang age1REPLACE_WITH_TONGFANG_AGE_PUBKEY

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *admin
          - *thinkpad
          - *tongfang
